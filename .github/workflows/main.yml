name: Daily Amazon Price Scraper

on:
  schedule:
    # متظبط على الساعة 6 المغرب بتوقيت جرينتش اللي هي 9 بالليل بتوقيت مصر الحالي (الصيفي)
    - cron: '0 18 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run the script
      env:
        MAIL_PASS: ${{ secrets.MAIL_PASS }}
      run: python main.py
